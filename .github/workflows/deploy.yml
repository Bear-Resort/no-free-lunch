# Deploys Convex production, builds the Vite frontend with the production
# Convex URL, then publishes `dist/` to GitHub Pages.
#
# Site: https://bear-resort.github.io/no-free-lunch/
#
# Required secret (repo → Settings → Secrets and variables → Actions):
#   CONVEX_DEPLOY_KEY
#
# Create it in Convex Dashboard → your project → Production deployment →
# Settings → Deploy Keys → Generate Production Deploy Key
# (enable deployment:deploy). Paste the full key value into GitHub.
#
# Also enable Pages: Settings → Pages → Build and deployment → GitHub Actions.

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Convex + frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Deploy Convex & build frontend
        run: >
          npx convex deploy
          --yes
          --cmd 'npm run build'
          --cmd-url-env-var-name VITE_CONVEX_URL
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          # Project Pages live under /no-free-lunch/
          VITE_BASE: /no-free-lunch/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
